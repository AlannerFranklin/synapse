<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse Agent WebUI</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-light: #64748b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* 侧边栏：设置区域 */
        .sidebar {
            width: 340px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .sidebar h2 { margin-top: 0; font-size: 1.25rem; display: flex; align-items: center; gap: 8px; color: #1e293b;}
        
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; font-size: 0.875rem; margin-bottom: 8px; color: #334155; }
        
        input[type="password"], input[type="text"], select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
            background-color: #f8fafc;
        }
        input[type="password"]:focus, input[type="text"]:focus, select:focus, textarea:focus { 
            border-color: var(--primary); 
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .help-text { font-size: 0.75rem; color: var(--text-light); margin-top: 6px; }

        /* 文件上传样式 */
        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 100px;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background-color: #f8fafc;
            transition: all 0.2s;
            cursor: pointer;
        }
        .file-upload-wrapper:hover {
            border-color: var(--primary);
            background-color: #eff6ff;
        }
        .file-upload-wrapper input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-upload-text {
            color: #64748b;
            font-size: 0.875rem;
            text-align: center;
            pointer-events: none;
        }
        .file-upload-text span {
            color: var(--primary);
            font-weight: 600;
        }

        /* 主体：聊天区域 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            position: relative;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        
        .api-badge {
            background-color: #e0e7ff;
            color: #1d4ed8;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: #f8fafc;
        }

        .msg-bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .msg-user {
            background-color: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-ai {
            background-color: #ffffff;
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .msg-error {
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            background: #ffffff;
        }

        .chat-input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        .chat-input-area input:focus { 
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .chat-input-area button {
            padding: 0 28px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }
        .chat-input-area button:hover { background-color: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 6px rgba(37, 99, 235, 0.25); }
        .chat-input-area button:disabled { background-color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none;}

        /* 右侧：树和轨迹展示 */
        .traces-panel {
            width: 380px;
            background: #ffffff;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: -1px 0 2px rgba(0,0,0,0.02);
            z-index: 10;
        }
        
        .traces-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            background: #ffffff;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .traces-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: #f8fafc;
        }

        .trace-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--primary);
            transition: transform 0.2s;
        }
        .trace-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .trace-node { font-weight: 700; color: #1e293b; font-size: 0.95rem; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;}
        .trace-node::before { content: '⚡'; font-size: 0.8em; }
        .trace-action { font-size: 0.85rem; color: var(--primary); font-weight: 600; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f1f5f9;}
        .trace-detail { font-size: 0.875rem; line-height: 1.5; color: #475569; }
        .trace-detail strong { color: #1e293b; font-weight: 600;}

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);} 40% { color: inherit; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);} 60% { text-shadow: .25em 0 0 inherit, .5em 0 0 rgba(0,0,0,0);} 80%, 100% { text-shadow: .25em 0 0 inherit, .5em 0 0 inherit;} }

        /* Tree Styles */
        .tree-container {
            flex: 1; 
            overflow-y: auto; 
            font-size: 0.875rem; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            padding: 16px 12px; 
            background: #ffffff;
        }
        
        .tree-node-wrapper {
            position: relative;
        }

        .tree-node-item { 
            cursor: pointer; 
            padding: 8px 10px; 
            border-radius: 6px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            margin: 4px 0; 
            display: flex; 
            align-items: center;
            color: #475569;
            transition: all 0.2s;
            position: relative;
            background: #ffffff;
            border: 1px solid transparent;
            z-index: 2;
        }
        
        .tree-node-item::before { content: '💬'; margin-right: 8px; font-size: 0.9em; opacity: 0.7; }
        .tree-node-item:hover { background: #f1f5f9; color: #0f172a; border-color: #cbd5e1; }
        
        /* 根节点特殊样式 */
        .tree-node-item.root-node { font-weight: bold; color: #1e293b; background: #f8fafc; }
        .tree-node-item.root-node::before { content: '🏠'; opacity: 1;}

        .tree-node-item.active { 
            background: #eff6ff; 
            color: var(--primary); 
            font-weight: 600; 
            border-color: #bfdbfe;
            box-shadow: 0 1px 2px rgba(37, 99, 235, 0.1);
        }
        .tree-node-item.active::before { opacity: 1; }
        
        /* 非当前路径的分支变灰 */
        .tree-node-item.inactive-branch { opacity: 0.5; }
        .tree-node-item.inactive-branch:hover { opacity: 1; }

        /* 树形连线系统 */
        .tree-children { 
            padding-left: 24px; 
            margin-left: 12px; 
            position: relative;
        }
        
        /* 垂直主线 */
        .tree-children::before {
            content: '';
            position: absolute;
            top: -4px;
            bottom: 12px; /* 不要连到底部，给最后一个横线留空间 */
            left: 0;
            width: 2px;
            background-color: #e2e8f0;
            z-index: 1;
        }
        
        /* 指向每个子节点的横线 */
        .tree-children > .tree-node-wrapper::before {
            content: '';
            position: absolute;
            top: 20px; /* 节点垂直居中的位置 */
            left: -24px;
            width: 20px;
            height: 2px;
            background-color: #e2e8f0;
            z-index: 1;
        }
        
        /* 如果是当前激活路径的一部分，连线高亮 */
        .tree-children.active-path::before,
        .tree-children > .tree-node-wrapper.active-path::before {
            background-color: #93c5fd;
        }
        
        .msg-edit-btn { 
            font-size: 0.8rem; 
            cursor: pointer; 
            color: var(--primary); 
            text-decoration: none; 
            margin-top: 8px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .msg-edit-btn:hover { opacity: 1; text-decoration: underline; }
        .msg-user-container { display: flex; flex-direction: column; align-items: flex-end; max-width: 85%; align-self: flex-end; }

        /* Tooltip Styles */
        .tooltip {
            position: absolute;
            background: #1e293b;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            max-width: 250px;
            white-space: normal;
            word-wrap: break-word;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: var(--shadow-md);
            pointer-events: none;
        }
        .tree-node-item:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }
        .tooltip::after {
            content: "";
            position: absolute;
            top: 50%;
            right: 100%;
            margin-top: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: transparent #1e293b transparent transparent;
        }
    </style>
</head>
<body>

    <!-- 左侧设置 -->
    <div class="sidebar">
        <h2>⚙️ 引擎配置</h2>
        
        <div class="form-group">
            <label for="apiType">模型提供商</label>
            <select id="apiType" onchange="updateApiBasePlaceholder()">
                <option value="deepseek">DeepSeek (兼容 OpenAI)</option>
                <option value="openai">OpenAI</option>
                <option value="qwen">通义千问 (兼容模式)</option>
                <option value="custom">自定义 (OpenAI 兼容)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="apiKey">API Key</label>
            <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
        </div>

        <div class="form-group" id="apiBaseGroup" style="display: none;">
            <label for="apiBase">API Base URL</label>
            <input type="text" id="apiBase" placeholder="https://api.openai.com/v1" autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>蓝图结构 (JSON)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="blueprintFile" accept=".json" onchange="handleFileUpload(event)">
                <div class="file-upload-text" id="fileUploadText">
                    <svg style="width:24px;height:24px;margin:0 auto 8px;display:block;color:#94a3b8;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    点击或拖拽上传 <span>blueprint.json</span>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 6px;">
                <div class="help-text" id="fileStatusText" style="margin-top: 0;">使用默认 blueprint.json</div>
                <button onclick="exportBlueprint()" style="background: none; border: none; color: var(--primary); font-size: 0.75rem; cursor: pointer; text-decoration: underline; padding: 0;">导出当前蓝图</button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border-color); width: 100%; margin: 16px 0;">

        <h2>🌳 对话决策树</h2>
        <div class="help-text" style="margin-bottom: 12px;">点击历史节点可回退状态并创建平行分支</div>
        <div id="treeView" class="tree-container">
            <!-- 树形结构容器 -->
        </div>
    </div>

    <!-- 中间聊天 -->
    <div class="main-chat">
        <div class="chat-header">
            <span>💬 Synapse 交互终端</span>
            <div class="api-badge" id="currentApiBadge">
                <span style="display:inline-block;width:8px;height:8px;background:#10b981;border-radius:50%;"></span>
                DeepSeek
            </div>
        </div>
        
        <!-- 新增：当前上下文提示条 -->
        <div id="contextBanner" style="background: #eff6ff; color: #1d4ed8; padding: 8px 24px; font-size: 0.85rem; border-bottom: 1px solid #bfdbfe; display: flex; align-items: center; gap: 8px;">
            <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="contextBannerText">当前位于: 初始状态 (发送消息将创建新分支)</span>
        </div>

        <div class="chat-messages" id="chatArea">
            <!-- 聊天内容 -->
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="输入你想说的话，按 Enter 发送..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <!-- 右侧轨迹 -->
    <div class="traces-panel">
        <div class="traces-header">
            <span>🔍 节点执行轨迹</span>
            <span style="font-size: 0.75rem; font-weight: normal; color: var(--text-light); background: #f1f5f9; padding: 2px 8px; border-radius: 10px;">实时状态</span>
        </div>
        <div class="traces-list" id="tracesArea">
            <div style="text-align: center; color: var(--text-light); margin-top: 80px; font-size: 0.9rem;">
                <svg style="width:48px;height:48px;margin:0 auto 16px;opacity:0.5;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                暂无执行轨迹。<br>发送消息后将在此展示。
            </div>
        </div>
    </div>

    <script>
        let chatNodesMap = {};
        let currentParentId = ""; 
        let customBlueprintContent = "";

        // 初始化
        window.onload = () => {
            const savedKey = localStorage.getItem('synapse_api_key');
            const savedType = localStorage.getItem('synapse_api_type');
            const savedBase = localStorage.getItem('synapse_api_base');
            
            if(savedKey) document.getElementById('apiKey').value = savedKey;
            if(savedType) {
                document.getElementById('apiType').value = savedType;
                updateApiBadge(savedType);
            }
            if(savedBase) document.getElementById('apiBase').value = savedBase;
            
            updateApiBaseVisibility();
            fetchTree();

            // 监听提供商切换更新 Badge
            document.getElementById('apiType').addEventListener('change', (e) => {
                updateApiBadge(e.target.value);
                updateApiBaseVisibility();
            });
        };

        function updateApiBadge(type) {
            const badge = document.getElementById('currentApiBadge');
            const map = {
                'deepseek': 'DeepSeek',
                'openai': 'OpenAI',
                'qwen': 'Qwen',
                'custom': 'Custom API'
            };
            badge.innerHTML = `<span style="display:inline-block;width:8px;height:8px;background:#10b981;border-radius:50%;"></span> ${map[type] || type}`;
        }

        function updateApiBaseVisibility() {
            const type = document.getElementById('apiType').value;
            const baseGroup = document.getElementById('apiBaseGroup');
            if (type === 'custom') {
                baseGroup.style.display = 'flex';
            } else {
                baseGroup.style.display = 'none';
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.type !== "application/json" && !file.name.endsWith(".json")) {
                alert("请上传 JSON 格式的文件");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    // 校验是否是合法 JSON
                    JSON.parse(e.target.result);
                    customBlueprintContent = e.target.result;
                    document.getElementById('fileStatusText').innerHTML = `<span style="color: #10b981;">✅ 已加载: ${file.name}</span>`;
                } catch (err) {
                    alert("JSON 文件解析失败，请检查文件格式！");
                    document.getElementById('fileStatusText').innerHTML = `<span style="color: #ef4444;">❌ 文件格式错误</span>`;
                }
            };
            reader.readAsText(file);
        }

        async function exportBlueprint() {
            try {
                const res = await fetch('/api/blueprint');
                if (!res.ok) {
                    alert("获取蓝图失败");
                    return;
                }
                const data = await res.text();
                
                // 创建一个 Blob 对象
                const blob = new Blob([data], { type: "application/json" });
                // 创建一个隐藏的 a 标签用于下载
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.style.display = "none";
                a.href = url;
                a.download = "exported_blueprint.json";
                document.body.appendChild(a);
                a.click();
                
                // 清理
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (err) {
                console.error("导出失败:", err);
                alert("导出蓝图时发生错误");
            }
        }

        async function fetchTree() {
            try {
                const res = await fetch('/api/tree');
                const data = await res.json();
                chatNodesMap = {};
                data.nodes.forEach(n => chatNodesMap[n.id] = n);
                currentParentId = data.currentId || "";
                renderTreeView();
                renderChatPath(currentParentId);
                updateContextBanner(currentParentId);
            } catch (e) {
                console.error("加载对话树失败", e);
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage(customMessage = null, targetParentId = null) {
            const inputEl = document.getElementById('userInput');
            const btnEl = document.getElementById('sendBtn');
            const apiKeyEl = document.getElementById('apiKey');
            const apiTypeEl = document.getElementById('apiType');
            const apiBaseEl = document.getElementById('apiBase');
            
            const message = customMessage !== null ? customMessage : inputEl.value.trim();
            const apiKey = apiKeyEl.value.trim();
            const apiType = apiTypeEl.value;
            const apiBase = apiType === 'custom' ? apiBaseEl.value.trim() : "";
            const pId = targetParentId !== null ? targetParentId : currentParentId;

            if (!message) return;
            if (!apiKey) {
                alert('请先输入 API Key！');
                apiKeyEl.focus();
                return;
            }

            localStorage.setItem('synapse_api_key', apiKey);
            localStorage.setItem('synapse_api_type', apiType);
            if(apiType === 'custom') localStorage.setItem('synapse_api_base', apiBase);

            if (customMessage === null) inputEl.value = '';
            
            appendMessageUI('user', message, null);
            const loadingId = appendLoading();
            
            inputEl.disabled = true;
            btnEl.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message, 
                        api_key: apiKey, 
                        api_type: apiType,
                        api_base: apiBase,
                        blueprint: customBlueprintContent, 
                        parent_id: pId 
                    })
                });
                
                const data = await response.json();
                removeElement(loadingId);

                if (data.error) {
                    appendMessageUI('error', '❌ ' + data.error, null);
                } else {
                    await fetchTree();
                }
            } catch (error) {
                removeElement(loadingId);
                appendMessageUI('error', '❌ 网络请求失败: ' + error.message, null);
            } finally {
                inputEl.disabled = false;
                btnEl.disabled = false;
                inputEl.focus();
            }
        }

        function editMessage(nodeId) {
            const node = chatNodesMap[nodeId];
            if (!node) return;
            const newMsg = prompt("修改你的消息以生成平行宇宙分支：", node.user_input);
            if (newMsg && newMsg.trim() !== "" && newMsg !== node.user_input) {
                sendMessage(newMsg.trim(), node.parent_id);
            }
        }

        function switchBranch(nodeId) {
            currentParentId = nodeId;
            renderTreeView();
            renderChatPath(currentParentId);
            updateContextBanner(nodeId);
        }

        function updateContextBanner(nodeId) {
            const bannerText = document.getElementById('contextBannerText');
            if (!nodeId || nodeId === 'root_node' || !chatNodesMap[nodeId]) {
                bannerText.innerText = "当前位于: 全局起点 (发送消息将创建新分支)";
            } else {
                const node = chatNodesMap[nodeId];
                let shortMsg = node.user_input.length > 20 ? node.user_input.substring(0, 20) + '...' : node.user_input;
                bannerText.innerHTML = `当前正在回复分支: <strong>"${escapeHTML(shortMsg)}"</strong>`;
            }
        }

        function renderChatPath(leafId) {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';
            
            if (!leafId || !chatNodesMap[leafId]) return;

            const path = [];
            let curr = chatNodesMap[leafId];
            while (curr) {
                path.unshift(curr);
                curr = chatNodesMap[curr.parent_id];
            }

            path.forEach(n => {
                if (n.id === 'root_node') {
                    // 根节点只展示初始的 AI 问候语
                    appendMessageUI('ai', n.reply, null);
                } else {
                    appendMessageUI('user', n.user_input, n.id);
                    appendMessageUI('ai', n.reply, n.id);
                }
            });
            
            if (path.length > 0) {
                renderTraces(path[path.length-1].traces);
            }
        }

        function appendMessageUI(role, text, nodeId) {
            const chatArea = document.getElementById('chatArea');
            
            if (role === 'user') {
                const container = document.createElement('div');
                container.className = 'msg-user-container';
                
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble msg-user';
                bubble.innerText = text;
                container.appendChild(bubble);

                if (nodeId) {
                    const editBtn = document.createElement('span');
                    editBtn.className = 'msg-edit-btn';
                    editBtn.innerHTML = '✏️ 修改分支';
                    editBtn.onclick = () => editMessage(nodeId);
                    container.appendChild(editBtn);
                }
                
                chatArea.appendChild(container);
            } else {
                const div = document.createElement('div');
                div.className = 'msg-bubble ' + (role === 'ai' ? 'msg-ai' : 'msg-error');
                div.innerText = text;
                chatArea.appendChild(div);
            }
            
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function renderTreeView() {
            const container = document.getElementById('treeView');
            container.innerHTML = '';
            
            // 计算当前激活路径，用于高亮连线和置灰非活动分支
            const activePathIds = new Set();
            let curr = chatNodesMap[currentParentId];
            while (curr) {
                activePathIds.add(curr.id);
                curr = chatNodesMap[curr.parent_id];
            }

            // 永远只从统一的 root_node 开始渲染
            const rootNode = chatNodesMap['root_node'];
            if (rootNode) {
                container.appendChild(buildTreeNode(rootNode, activePathIds));
            }
        }

        function buildTreeNode(node, activePathIds) {
            const wrapper = document.createElement('div');
            wrapper.className = 'tree-node-wrapper';
            if (activePathIds.has(node.id)) {
                wrapper.classList.add('active-path');
            }
            
            const item = document.createElement('div');
            item.className = 'tree-node-item';
            
            if (node.id === 'root_node') {
                item.classList.add('root-node');
                item.innerText = '全局系统起点';
            } else {
                let shortMsg = node.user_input.length > 12 ? node.user_input.substring(0, 12) + '...' : node.user_input;
                item.innerText = shortMsg;
            }

            if (node.id === currentParentId) {
                item.classList.add('active');
            } else if (!activePathIds.has(node.id) && node.id !== 'root_node') {
                // 如果这个节点不在当前激活的路径上，置灰
                item.classList.add('inactive-branch');
            }
            
            // Tooltip 构建
            if (node.id !== 'root_node') {
                const tooltip = document.createElement('div');
                tooltip.className = 'tooltip';
                tooltip.style.left = '100%';
                tooltip.style.top = '50%';
                tooltip.style.transform = 'translateY(-50%)';
                tooltip.style.marginLeft = '10px';
                
                let traceSummary = "无执行轨迹";
                if (node.traces && node.traces.length > 0) {
                    const nodes = [...new Set(node.traces.map(t => t.NodeName || t.node_name))].filter(Boolean);
                    traceSummary = `执行了 ${nodes.length} 个节点:\n${nodes.join(' → ')}`;
                }
                
                tooltip.innerHTML = `
                    <strong>User:</strong> ${escapeHTML(node.user_input)}<br><br>
                    <strong>AI:</strong> ${escapeHTML(node.reply.substring(0, 50))}${node.reply.length > 50 ? '...' : ''}<br><br>
                    <span style="color:#94a3b8;">${traceSummary}</span>
                `;
                item.appendChild(tooltip);
            }

            item.onclick = (e) => {
                e.stopPropagation();
                switchBranch(node.id);
            };
            wrapper.appendChild(item);

            const children = Object.values(chatNodesMap).filter(n => n.parent_id === node.id);
            // 对子节点进行排序，保证渲染顺序稳定（比如按时间戳）
            children.sort((a, b) => a.timestamp - b.timestamp);
            
            if (children.length > 0) {
                const childContainer = document.createElement('div');
                childContainer.className = 'tree-children';
                
                // 如果当前节点的任何一个子节点在激活路径上，则高亮主线
                if (children.some(c => activePathIds.has(c.id))) {
                    childContainer.classList.add('active-path');
                }
                
                children.forEach(c => {
                    childContainer.appendChild(buildTreeNode(c, activePathIds));
                });
                wrapper.appendChild(childContainer);
            }
            return wrapper;
        }

        function appendLoading() {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            const id = 'loading-' + Date.now();
            div.id = id;
            div.className = 'msg-bubble msg-ai loading-dots';
            div.innerText = 'Synapse 正在思考';
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return id;
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function renderTraces(traces) {
            const tracesArea = document.getElementById('tracesArea');
            tracesArea.innerHTML = '';
            
            if (!traces || traces.length === 0) {
                tracesArea.innerHTML = `
                    <div style="text-align: center; color: #94a3b8; margin-top: 80px; font-size: 0.9rem;">
                        暂无有效轨迹
                    </div>`;
                return;
            }

            traces.forEach(t => {
                const card = document.createElement('div');
                card.className = 'trace-card';
                
                const nodeName = t.NodeName || t.node_name || 'Unknown';
                const action = t.Action || t.action || '';
                const thought = t.Reasoning || t.reasoning || t.Thought || t.thought || '';
                const result = t.Result || t.result || '';

                card.innerHTML = `
                    <div class="trace-node">${escapeHTML(nodeName)}</div>
                    <div class="trace-action">${escapeHTML(action)}</div>
                    <div class="trace-detail">
                        <strong>思考:</strong> ${escapeHTML(thought)}<br>
                        <strong style="margin-top:8px; display:inline-block;">结果:</strong> 
                        <span style="color: #0f172a; background: #f8fafc; padding: 2px 4px; border-radius: 4px; font-family: monospace;">
                            ${escapeHTML(typeof result === 'string' ? result : JSON.stringify(result))}
                        </span>
                    </div>
                `;
                tracesArea.appendChild(card);
            });
            tracesArea.scrollTop = tracesArea.scrollHeight;
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }
    </script>
</body>
</html>
